services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongodb:27017/xaichain
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - xaichain

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      - xaichain

  mongodb:
    image: mongo:7.0
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=xaichain
    volumes:
      - mongodb_data:/data/db
    networks:
      - xaichain

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data
    networks:
      - xaichain

volumes:
  mongodb_data:
  redis_data:

networks:
  xaichain:
    driver: bridge
